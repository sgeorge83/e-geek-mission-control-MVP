<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="sgeorge83 · E-GEEK Mission Control — automation status at a glance" />
  <title>sgeorge83 · E-GEEK Mission Control</title>
  <link rel="icon" href="https://github.com/sgeorge83.png" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="bg-glow" aria-hidden="true"></div>

  <div class="shell">
    <header class="topbar">
      <div class="identity">
        <a href="https://github.com/sgeorge83" target="_blank" rel="noopener" class="avatar-link">
          <img
            src="https://github.com/sgeorge83.png"
            alt="Sharoon George"
            class="avatar"
            width="48"
            height="48"
          />
        </a>
        <div class="identity-text">
          <div class="name-row">
            <a href="https://github.com/sgeorge83" target="_blank" rel="noopener" class="handle">sgeorge83</a>
            <span class="sep">·</span>
            <span class="egeek">E-GEEK</span>
          </div>
          <h1 class="title">Mission Control</h1>
        </div>
      </div>

      <div class="topbar-right">
        <div class="counts" id="counts" aria-label="Status summary"></div>
        <div class="meta-pill" id="overall-pill">
          <span class="dot"></span>
          <span id="overall-label">Loading…</span>
        </div>
        <p class="last-updated" id="last-updated">—</p>
        <button type="button" class="btn-refresh" id="refresh-btn" title="Reload status">↻</button>
      </div>
    </header>

    <main class="board" id="board" aria-live="polite"></main>

    <footer class="foot">
      <a href="https://github.com/sgeorge83/e-geek-mission-control-MVP/actions" target="_blank" rel="noopener">Actions</a>
      <span>·</span>
      <a href="https://github.com/sgeorge83/e-geek-mission-control-MVP" target="_blank" rel="noopener">Repo</a>
      <span>·</span>
      <span>Hourly collect</span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
