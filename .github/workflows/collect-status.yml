name: Collect Status

on:
  schedule:
    # Every hour at :15 past the hour (UTC)
    - cron: "15 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "config/services.json"
      - "scripts/collect-status.mjs"

permissions:
  contents: write

concurrency:
  group: collect-status
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Collect automation status
        env:
          GH_STATUS_TOKEN: ${{ secrets.GH_STATUS_TOKEN }}
          BIBLE_CRON_SECRET: ${{ secrets.BIBLE_CRON_SECRET }}
        run: node scripts/collect-status.mjs

      - name: Commit status.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/status.json; then
            echo "No status changes to commit."
          else
            git add data/status.json
            git commit -m "chore: update automation status [skip ci]"
            git push
          fi
